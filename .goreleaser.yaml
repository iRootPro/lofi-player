version: 2

project_name: lofi-player

before:
  hooks:
    - go mod tidy

builds:
  - id: lofi-player
    main: .
    binary: lofi-player
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

brews:
  - name: lofi-player
    homepage: https://github.com/iRootPro/lofi-player
    description: Keyboard-driven TUI for lofi, chillhop and ambient internet radio
    license: MIT
    repository:
      owner: iRootPro
      name: homebrew-tap
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "brew: lofi-player {{ .Tag }}"
    dependencies:
      - name: mpv
      - name: yt-dlp
        type: optional
    install: |
      bin.install "lofi-player"
    test: |
      system "#{bin}/lofi-player", "--version"
